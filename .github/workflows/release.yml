name: Release

# Every merge to main (squash-only) bumps the patch version, builds the image, pushes it to
# Docker Hub (florinbobis/heimdall:<version> + :latest), and cuts a GitHub Release + tag.
#
# Docs- and site-only changes are excluded (paths-ignore) so a README or landing-page tweak does
# not cut a gateway release.
#
# Opt-in: this job only runs when the repo variable RELEASE_ENABLED is "true". Until you set it
# (gh variable set RELEASE_ENABLED --body true), every merge skips release - so setup commits do
# not publish. Requires secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'site/**'
      - 'assets/**'
      - '.github/workflows/pages.yml'

permissions:
  contents: write # push the version tag and create the GitHub Release

jobs:
  release:
    if: ${{ vars.RELEASE_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full tag history for the version bump

      - name: Compute next version (patch bump)
        id: ver
        run: |
          latest=$(git tag --list 'v[0-9]*' --sort=-v:refname | head -n1)
          [ -z "$latest" ] && latest=v0.0.0
          base=${latest#v}
          major=${base%%.*}; rest=${base#*.}; minor=${rest%%.*}; patch=${rest##*.}
          patch=$((patch + 1))
          echo "tag=v$major.$minor.$patch" >> "$GITHUB_OUTPUT"
          echo "version=$major.$minor.$patch" >> "$GITHUB_OUTPUT"
          echo "Next version: v$major.$minor.$patch"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            florinbobis/heimdall:${{ steps.ver.outputs.version }}
            florinbobis/heimdall:latest

      - name: Tag and create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "${{ steps.ver.outputs.tag }}" \
            --generate-notes
